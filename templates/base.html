<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="/static/manifest.json">
    <title>{% block title %}StipConnect{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">
    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="text-xl font-bold tracking-tight">StipConnect</a>
                <div class="flex items-center space-x-6">
                    <a href="{% url 'profile_list' %}" class="hover:text-indigo-200 transition">Alle Profile</a>
                    {% if user.is_authenticated %}
                        <a href="{% url 'profile_detail' pk=user.profile.pk %}" class="hover:text-indigo-200 transition">Mein Profil</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center text-sm text-gray-500">
            © {% now "Y" %} StipConnect — <a href="{% url 'datenschutz' %}" class="underline hover:text-gray-700">Datenschutz</a>
        </div>
    </footer>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/js/sw.js');
        }
    </script>
</body>
</html>
