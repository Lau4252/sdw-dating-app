version: "3.9"

services:
  web:
    build: .
    container_name: stipconnect_web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
      - ./staticfiles:/app/staticfiles
      - ./templates:/app/templates
      - ./profiles:/app/profiles
    expose:
      - "8000"
    networks:
      - stipconnect

  caddy:
    image: caddy:2-alpine
    container_name: stipconnect_caddy
    restart: unless-stopped
    ports:
      - "8081:80"
      # - "8443:443"  # Falls du lokales HTTPS willst; Cloudflare macht das aber schon
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./staticfiles:/srv/static:ro
      - ./media:/srv/media:ro
    networks:
      - stipconnect

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: stipconnect_tunnel
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate --config /etc/cloudflared/stipconnect.yml run
    volumes:
      - /home/laurensmain/.cloudflared/stipconnect.yml:/etc/cloudflared/stipconnect.yml:ro
      - /home/laurensmain/.cloudflared/08d783d9-052e-4b9c-ad72-1c3dc9b0d492.json:/home/laurensmain/.cloudflared/08d783d9-052e-4b9c-ad72-1c3dc9b0d492.json:ro

volumes:
  caddy_data:
  caddy_config:

networks:
  stipconnect:
    driver: bridge
